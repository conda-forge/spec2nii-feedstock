{% set name = "spec2nii" %}
{% set version = "0.8.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9caa9cdf90df14ba41d039e4033e7565518056c55f340fb5bb661a435ff6ab35

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - spec2nii = spec2nii.spec2nii:main

requirements:
  build:
    - python >=3.9
    - pip
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=77
    - setuptools-scm >=8
  run:
    - python >={{ python_min }}
    - numpy >=1.26
    - nibabel
    - pydicom 3.*
    - pymapvbvd >=0.6.0
    - scipy >=1.13
    - brukerapi >=0.1.8,<0.1.9
    - pandas
    - nifti-mrs >=1.3.2
    - chardet

test:
  requires:
    - python {{ python_min }}
  imports:
    - spec2nii
  commands:
    - spec2nii --help

about:
  home: https://github.com/wexeee/spec2nii
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Multi-format in vivo MR spectroscopy conversion to NIfTI
  description: |
    A program for multi-format in vivo MR spectroscopy conversion to NIFTI.
  doc_url: https://github.com/wexeee/spec2nii
  dev_url: https://github.com/wexeee/spec2nii

extra:
  recipe-maintainers:
    - vkarlaftis
    - wtclarke
